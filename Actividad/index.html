<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carta de Presentación</title>

    <!-- hoja de estilos -->
    <link rel="stylesheet" href="assets/styles/styles.css">
</head>

<body>

    <div class="tarjeta">

        <!-- imagen de perfil -->
        <img 
        src="assets/images/FotoProfesional.jfif"
        alt="Foto de perfil"
        class="imagen-perfil">

        <!-- nombre -->
        <h2 class="nombre">Hugo Lizama</h2>

        <!-- profesión -->
        <p class="titulo-profesion">
            Desarrollador Web
        </p>

        <!-- descripción -->
        <p class="descripcion">
            Desarrollador apasionado por la tecnología y el desarrollo web. 
            Me gusta crear soluciones eficientes, limpias y escalables 
            utilizando tecnologías modernas.
        </p>

        <!-- lista de habilidades -->
        <div class="habilidades">

            <span class="skill">HTML</span>
            <span class="skill">CSS</span>
            <span class="skill">JavaScript</span>
            <span class="skill">React</span>

        </div>

        <!-- botones -->
        <div class="acciones">

            <a href="mailto:leonardo.gutial@gmail.com" class="boton-contacto">
                Contactar
            </a>

            <a href="https://danileonardo.github.io" class="boton-portafolio">
                Ver Portafolio
            </a>

        </div>

    </div>

</body>
</html>
